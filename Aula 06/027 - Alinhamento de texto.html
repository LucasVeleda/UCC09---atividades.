<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Posicionamento de Texto</title>
  <style>
    /*reset do padrão do navegador*/

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body{
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background-color: #f0f0f0;
    }

    .content {
      flex: 1;
      padding: 30px 20px;
    }

    h1{
      text-align: center;
      margin-bottom: 30px;
      color: #333;
    }

    .left-text {
      text-align: left;
      background-color: #d1e7dd;
      margin-bottom: 20px;
      color: #555;
    }

    .right-text {
      text-align: right;
      background-color: #f8d7da;
      margin-bottom: 20px;
      color: #555;
    }

    .top-text {
      text-align: center;
      background-color: #cff4fc;
      margin-bottom: 20px;
      color: #555;
    }

    .side-by-side {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .text-box {
      flex: 1;
      background-color: #e2e3e5;
      padding: 20px;
      color: #555;
    }

    .bottom-text {
      text-align: center;
      background-color: orange;
      padding: 15px;
      color: #555;
    }

 </style>
</head>
<body>

  <!-- Conteúdo principal -->
  <div class="content">
    <h1>Exemplos de Posicionamento de Texto</h1>

    <!-- Alinhamento à esquerda -->
    <div class="left-text">
      Este texto está alinhado à esquerda.
    </div>

    <!-- Alinhamento à direita -->
    <div class="right-text">
      Este texto está alinhado à direita.
    </div>

    <!-- Texto ilustrativo no "topo" (posição relativa ao fluxo) -->
    <div class="top-text">
      Este texto está no topo da seção.
    </div>

    <!-- Textos lado a lado (flexível e responsivo) -->
    <div class="side-by-side">
      <div class="text-box">
        Texto 1 lado a lado.
      </div>
      <div class="text-box">
        Texto 2 lado a lado.
      </div>
    </div>
  </div>

  <!-- Rodapé fixado no fim da página -->
  <div class="bottom-text">
    Este texto está no rodapé da página.
  </div>

</body>
</html>
