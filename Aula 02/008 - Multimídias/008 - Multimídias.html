<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimídias</title>
</head>
<body>

    <h1> Inserindo áudio, imagem e vídeo</h1>

    <!-- Inserindo imagem -->

    <img src="Imagem1.jpg" alt="html" width="100" height="100">
    <img src="Imagem2.jpg" alt="css" width="100" height="100">
    <img src="Imagem3.jpg" alt="javascript" width="100" height="100">
<br>

<video poster="video.png" width="200" height="200" controls loop muted>
<source src="video.mp4" type="video/mp4">
</video>
<br>

<audio controls loop>
<source src="audio.mp3" type="audio/mpeg">
</audio>


</body>
</html>
