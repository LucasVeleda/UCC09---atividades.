<!DOCTYPE html>
<html>
    
<head>
    <style>
    /* Seletor de elementos: se aplica nas Tags*/
    p{
        color: blue;
        font-size: 25px
    }

    /*Seletor de classe: se aplica em todos os elementos 
    que estiverem com a classe e nome titulo*/

    .titulo{
        color: red;
        font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    }


     /*Seletor de ID: Se aplica em todos os elemantos
    que estiverem em destaque*/

    #destaque {
        font-size:  20px;
        font-weight: bold; /*Negrito*/
    }
    </style>

   

    

</head>

<body> 
    <h1 class="titulo">Título usando Classe</h1> 
    <p>Parágrafo usando Elemento</p>
    <p id="destaque">Parágrafo usando ID</p>
</body>

</html>
