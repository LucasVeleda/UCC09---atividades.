<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de BoxModel</title>

    <style>
        .caixa {

            background-color: purple;
            color: aqua;

            width: 300px;
            height: 200px;

            padding-top: 20px;
            padding-right: 20px;
            padding-left: 20px;
            padding-bottom: 30px;

            border-width: 15px;
            border-style: solid;
            border-color: pink;
            border-radius: 10px;

            margin-top: 40px;
            margin-right: 50px;
            margin-left: 50px;
            margin-bottom: 40px;
        }
    </style>

</head>

<body>

    <div class="caixa">
        Este é um exemplo de uma caixa com preenchimento (padding),
        borda (border) e margem (margin).
    </div>

</body>

</html>
