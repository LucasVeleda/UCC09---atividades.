<!DOCTYPE html>
<html>
    
<head>

<style> 
    p {
        color: purple;
        font-size: 20px;
    }


.titulo {
    color: blue;
    text-align: center;
    font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
}

/* Seletor de ID: Se aplica em todos os elementos que estiverem em destaque.*/

#destaque {
    font-size: 35px;
    color: red;
    font-weight: bold; /*negrito*/
}

</style>


</head>

<body> 
    <h1 class="titulo">Título usando Classe</h1> 
    <p>Parágrafo usando Elemento</p>
    <p id="destaque">Parágrafo usando ID</p>


</body>

</html>
